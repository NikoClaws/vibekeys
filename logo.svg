<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Key Icon -->
  <g transform="translate(10, 12)" filter="url(#glow)">
    <!-- Key head (circular part with hole) -->
    <circle cx="22" cy="22" r="18" fill="none" stroke="url(#keyGradient)" stroke-width="4"/>
    <circle cx="22" cy="22" r="8" fill="url(#keyGradient)"/>
    
    <!-- Key shaft -->
    <rect x="38" y="18" width="28" height="8" rx="2" fill="url(#keyGradient)"/>
    
    <!-- Key teeth -->
    <rect x="52" y="26" width="6" height="10" rx="1" fill="url(#keyGradient)"/>
    <rect x="60" y="26" width="6" height="14" rx="1" fill="url(#keyGradient)"/>
    
    <!-- Sparkle effects -->
    <circle cx="12" cy="12" r="2" fill="#A855F7" opacity="0.8"/>
    <circle cx="32" cy="8" r="1.5" fill="#EC4899" opacity="0.6"/>
  </g>
  
  <!-- VibeKeys Text -->
  <text x="85" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="800" letter-spacing="-1">
    <tspan fill="#1F2937">Vibe</tspan><tspan fill="url(#textGradient)">Keys</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="86" y="70" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" letter-spacing="0.5">
    Your Key to Tech Deals
  </text>
</svg>
