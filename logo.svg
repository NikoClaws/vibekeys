<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <!-- Key icon integrated into V -->
  <g transform="translate(2, 8)">
    <!-- Simplified key shape -->
    <circle cx="12" cy="16" r="8" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
    <circle cx="12" cy="16" r="3" fill="#7C3AED"/>
    <rect x="19" y="14" width="12" height="4" rx="1" fill="#7C3AED"/>
    <rect x="26" y="18" width="3" height="5" rx="0.5" fill="#7C3AED"/>
    <rect x="30" y="18" width="3" height="7" rx="0.5" fill="#7C3AED"/>
  </g>
  <!-- VibeKeys wordmark -->
  <text x="42" y="33" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#111827">Vibe</tspan><tspan fill="url(#accent)">Keys</tspan>
  </text>
</svg>
